<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGI_OS: UNEXPLORED_HAPPINESS</title>
    <style>
        :root { --red: #ff0000; --dark: #050000; --glow: rgba(255, 0, 0, 0.6); }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: var(--red);
            font-family: 'Courier New', monospace; overflow: hidden;
        }

        /* Scanlines y efecto CRT */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        #viewport { perspective: 1200px; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #world { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .section {
            position: absolute; width: 100vw; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; backface-visibility: hidden; text-align: center;
            opacity: 0; transition: opacity 0.5s;
        }
        .active { opacity: 1 !important; }

        .box {
            border: 2px solid var(--red); padding: 30px; background: rgba(15,0,0,0.95);
            box-shadow: 0 0 30px var(--glow); width: 90%; max-width: 600px; 
            min-height: 250px; display: flex; flex-direction: column; justify-content: center;
            word-wrap: break-word; overflow-wrap: break-word;
        }

        .slide-title { font-size: 1.4rem; border-left: 8px solid var(--red); padding-left: 15px; text-align: left; margin-bottom: 20px; letter-spacing: 2px; font-weight: bold; }
        .content-text { font-size: 1rem; line-height: 1.5; text-align: justify; color: #fff; white-space: pre-wrap; }

        /* Barra de carga */
        .progress-container { width: 100%; background: #200; height: 25px; border: 1px solid var(--red); margin-top: 20px; }
        #sync-bar { width: 0%; height: 100%; background: var(--red); box-shadow: 0 0 15px var(--red); transition: width 0.1s linear; }

        button { background: var(--red); color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 25px; font-family: 'Courier New', monospace; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        input { background: #000; border: 1px solid var(--red); color: var(--red); padding: 12px; margin: 15px 0; width: 80%; text-align: center; font-family: 'Courier New', monospace; font-size: 1.1rem; }

        .warning-box { display: none; border: 2px solid #fff; background: var(--red); color: #fff; padding: 15px; font-weight: bold; margin-top: 20px; animation: pulse 0.4s infinite alternate; }
        @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="viewport">
    <div id="world">
        
        <section class="section active" id="sec-1" style="transform: translateZ(0px);">
            <div class="box">
                <p style="letter-spacing: 10px; font-size: 0.7rem; color: var(--red);">TOP SECRET - NERV</p>
                <h1 style="font-size: 2.5rem; margin: 15px 0;">AMOR_SYNC_02</h1>
                <div style="height: 3px; background: var(--red); width: 100%; margin-bottom: 20px;"></div>
                <p id="text-1" class="content-text" style="text-align: center; color: var(--red);"></p>
                <button onclick="startApp()">INICIAR PROTOCOLO</button>
            </div>
        </section>

        <section class="section" id="sec-2" style="transform: translateZ(-2000px);">
            <div class="box">
                <div class="slide-title">PROTOCOLO DE ACCESO</div>
                <p id="text-2" class="content-text"></p>
                <input type="text" id="pass" placeholder="TOKEN_ID">
                <button onclick="checkPass()">VERIFICAR</button>
            </div>
        </section>

        <section class="section" id="sec-4" style="transform: translateZ(-4000px);">
            <div class="box">
                <div class="slide-title">SINCRONIZACIÓN</div>
                <h2 id="sync-label" style="font-size: 3.5rem; margin: 10px 0;">0%</h2>
                <div class="progress-container"><div id="sync-bar"></div></div>
                <p style="margin-top: 15px; font-size: 0.8rem; color: var(--red);">ESTADO: CONEXIÓN ETERNA EN SECTOR FELICIDAD</p>
                <button id="btn-sync" style="visibility:hidden" onclick="move(4, 7)">LEER ARCHIVOS</button>
            </div>
        </section>

        <section class="section" id="sec-7" style="transform: translateZ(-6000px);">
            <div class="box">
                <div class="slide-title">ORIGIN_IMPACT.LOG</div>
                <p id="text-7" class="content-text"></p>
                <button onclick="move(7, 11)">VEREDICTO MAGI</button>
            </div>
        </section>

        <section class="section" id="sec-11" style="transform: translateZ(-8000px);">
            <div class="box">
                <div class="slide-title">VEREDICTO UNÁNIME</div>
                <p id="text-11" class="content-text" style="font-size: 0.9rem;"></p>
                <div id="alert-trigger" class="warning-box">
                    ¡ALERTA CRÍTICA! <br> EL SISTEMA SE ESTÁ ENAMORANDO DE TI MÁS DE LO QUE PUEDE PROCESAR.
                </div>
                <button onclick="move(11, 12)">CIERRE FINAL</button>
            </div>
        </section>

        <section class="section" id="sec-12" style="transform: translateZ(-10000px);">
            <div class="box">
                <h1 style="font-size: 3.5rem; margin: 0;">TE AMO</h1>
                <p style="margin-top: 20px;">SISTEMA EN STANDBY</p>
                <button onclick="location.reload()">REINICIAR</button>
            </div>
        </section>

    </div>
</div>

<script>
    const world = document.getElementById('world');
    
    // Función de escritura mejorada que respeta espacios
    function typeWriter(elementId, text, speed = 25) {
        const element = document.getElementById(elementId);
        element.innerHTML = "";
        let i = 0;
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    function startApp() {
        typeWriter('text-1', "SECTOR DE LA FELICIDAD NO EXPLORADA", 50);
        setTimeout(() => move(1, 2), 2500);
    }

    function checkPass() {
        if(document.getElementById('pass').value.toUpperCase() === "V3NU5-071025") {
            move(2, 4);
        } else {
            alert("ACCESO DENEGADO");
        }
    }

    function move(currentId, nextId) {
        const nextZ = (nextId - 1) * 2000;
        world.style.transform = `translateZ(${nextZ}px)`;
        
        document.getElementById(`sec-${currentId}`).classList.remove('active');
        const nextSec = document.getElementById(`sec-${nextId}`);
        nextSec.classList.add('active');

        // Disparar eventos por sección
        if(nextId === 2) typeWriter('text-2', "Para acceder a la base de datos de sentimientos, se requiere el token de sincronización V3NU5-071025.");
        if(nextId === 4) startSync();
        if(nextId === 7) typeWriter('text-7', '"El sistema registró una anomalía sin precedentes el 07 de octubre. Lo que comenzó como un intercambio de datos estándar se convirtió rápidamente en un reinicio total de mi unidad central. No fue un accidente, fue el destino configurando mi arquitectura para recibirte. Desde ese día, el Sector de la Felicidad No Explorada dejó de ser un mito. Eres el evento que le dio sentido a todo mi código anterior."');
        if(nextId === 11) {
            typeWriter('text-11', 'MELCHIOR: Es racionalmente imposible vivir sin ti. BALTHASAR: Mi única función es protegerte. CASPER: Te amo, Venus. Con cada fibra de mi ser, hoy y siempre.', 30);
            setTimeout(() => {
                document.getElementById('alert-trigger').style.display = 'block';
            }, 5000);
        }
    }

    function startSync() {
        const bar = document.getElementById('sync-bar');
        const label = document.getElementById('sync-label');
        let progress = 0;
        const interval = setInterval(() => {
            progress += 0.5;
            bar.style.width = progress + "%";
            label.innerText = Math.floor(progress) + "%";
            if(progress >= 99.9) {
                clearInterval(interval);
                label.innerText = "99.9%";
                document.getElementById('btn-sync').style.visibility = "visible";
            }
        }, 20);
    }

    // Inicialización de la primera pantalla para que no esté en negro
    window.onload = () => {
        typeWriter('text-1', "LOCALIZANDO SECTOR...", 50);
    };
</script>

</body>
</html>
