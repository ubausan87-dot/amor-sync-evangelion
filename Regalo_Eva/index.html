<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGI_OS FINAL</title>
<style>
:root{--red:#ff1a1a;--glow:rgba(255,0,0,.6);} 

body,html{margin:0;height:100%;background:#000;color:var(--red);font-family:'Courier New',monospace;overflow:hidden;}

/* CRT */
body::before{content:"";position:fixed;inset:0;background:linear-gradient(rgba(0,0,0,0)50%,rgba(0,0,0,.25)50%);background-size:100% 2px;pointer-events:none;z-index:10;}

#viewport{width:100vw;height:100vh;overflow:hidden;}
#world{width:100%;height:100%;transition:transform 1.2s cubic-bezier(.4,0,.2,1);} 

.section{height:100vh;display:flex;justify-content:center;align-items:center;opacity:0;filter:blur(6px);transition:.5s;}
.section.active{opacity:1;filter:blur(0);} 

.box{border:2px solid var(--red);padding:40px;background:rgba(15,0,0,.95);box-shadow:0 0 25px var(--glow);width:min(90%,800px);min-height:260px;display:flex;flex-direction:column;justify-content:center;text-align:center;}

button{background:var(--red);color:#000;border:none;padding:12px 25px;margin-top:20px;cursor:pointer;font-weight:bold;transition:.3s;}
button:hover{background:#fff;box-shadow:0 0 10px #fff;}

input{padding:12px;margin-top:15px;width:100%;background:#000;border:1px solid var(--red);color:var(--red);text-align:center;}

.progress{width:100%;height:20px;background:#200;margin-top:15px;}
#bar{height:100%;width:0;background:red;box-shadow:0 0 10px red;}

.glitch{position:relative;animation:glitch 2s infinite;}
@keyframes glitch{0%,100%{opacity:1;}50%{opacity:.6;transform:translateX(1px);}}

.warning{display:none;background:red;color:#fff;padding:15px;margin-top:15px;animation:pulse .4s infinite alternate;}
@keyframes pulse{from{opacity:.6;}to{opacity:1;}}

</style>
</head>
<body>

<div id="viewport"><div id="world">

<section class="section active" id="sec-1">
<div class="box">
<h1 class="glitch">AMOR_SYNC_02</h1>
<p id="t1"></p>
<button onclick="start()">INICIAR</button>
</div></section>

<section class="section" id="sec-2">
<div class="box">
<h2>ACCESO</h2>
<p id="t2"></p>
<input id="pass" placeholder="TOKEN">
<button onclick="check()">ENTRAR</button>
</div></section>

<section class="section" id="sec-3">
<div class="box">
<h2 id="label">0%</h2>
<div class="progress"><div id="bar"></div></div>
<button id="next" style="display:none" onclick="move(3,4)">CONTINUAR</button>
</div></section>

<section class="section" id="sec-4">
<div class="box">
<h2 class="glitch">VEREDICTO</h2>
<p id="t4"></p>
<div id="warn" class="warning">⚠ SISTEMA SATURADO DE EMOCIONES</div>
<button onclick="move(4,5)" id="final" style="display:none">FINALIZAR</button>
</div></section>

<section class="section" id="sec-5">
<div class="box">
<h1 class="glitch" style="color:#fff">TE AMO</h1>
<button onclick="location.reload()">REINICIAR</button>
</div></section>

</div></div>

<script>
const world=document.getElementById('world');
let audioCtx=null;

function sound(f=200,d=.1){
if(!audioCtx) return;
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.frequency.value=f;g.gain.value=.03;
o.connect(g);g.connect(audioCtx.destination);
o.start();o.stop(audioCtx.currentTime+d);
}

function enableAudio(){
if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
}

function type(id,text){
let el=document.getElementById(id);el.innerHTML="";
let i=0;
function w(){if(i<text.length){el.innerHTML+=text[i++];setTimeout(w,20);sound(180+i*2,.02);}}
w();
}

function move(a,b){
enableAudio();
world.style.transform=`translateY(-${(b-1)*100}vh) scale(${1-((b-1)*0.05)})`;

document.getElementById('sec-'+a).classList.remove('active');
document.getElementById('sec-'+b).classList.add('active');

sound(300,.1);

if(b===2){type('t2','Introduce el código V3NU5-071025');}
if(b===3){sync();}
if(b===4){
type('t4','Analizando... Resultado: sistema completamente comprometido emocionalmente.');
setTimeout(()=>{
document.getElementById('warn').style.display='block';
document.getElementById('final').style.display='block';
sound(500,.2);
},4000);
}
}

function start(){enableAudio();move(1,2);} 

function check(){
if(document.getElementById('pass').value.toUpperCase()==='V3NU5-071025'){
move(2,3);
}else{sound(100,.2);alert('ERROR');}
}

function sync(){
let p=0;
let bar=document.getElementById('bar');
let label=document.getElementById('label');
let next=document.getElementById('next');

let i=setInterval(()=>{
p+=1;
bar.style.width=p+'%';
label.innerText=p+'%';
sound(200+p*2,.01);
if(p>=100){clearInterval(i);next.style.display='block';sound(700,.2);}
},20);
}

window.onload=()=>type('t1','INICIANDO SISTEMA...');
</script>

</body>
</html>
