<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGI_OS: UNEXPLORED_HAPPINESS</title>

<style>
:root {
    --red: #ff1a1a;
    --dark: #050000;
    --glow: rgba(255, 0, 0, 0.6);
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: var(--red);
    font-family: 'Courier New', monospace;
    overflow: hidden;
}

/* 🔧 FIX: mejor profundidad */
#viewport {
    perspective: 2000px;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

#world {
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 1.3s ease;
}

.section {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 0.4s;
}

.section.active {
    opacity: 1;
}

/* 🔧 FIX: mejor centrado */
.box {
    border: 2px solid var(--red);
    padding: 35px;
    background: rgba(15, 0, 0, 0.95);
    width: min(90%, 860px);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.content-text {
    min-height: 120px;
    color: #fff;
}

input {
    background: #000;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 15px;
    margin: 15px 0;
    width: 100%;
    max-width: 420px;
    text-align: center;
}

button {
    background: var(--red);
    color: #000;
    border: none;
    padding: 15px 30px;
    cursor: pointer;
    margin-top: 20px;
}

/* GLITCH */
.glitch {
    position: relative;
    animation: glitch 2s infinite;
}
@keyframes glitch {
    0%,100%{transform: none;}
    50%{transform: skewX(2deg);}
}
</style>
</head>

<body>

<div id="viewport">
<div id="world">

<!-- 1 -->
<section class="section active" id="sec-1">
<div class="box">
<h1 class="glitch">AMOR_SYNC_02</h1>
<p id="text-1" class="content-text"></p>
<button onclick="startApp()">INICIAR SECUENCIA</button>
</div>
</section>

<!-- 2 -->
<section class="section" id="sec-2" style="transform: translateZ(-1200px);">
<div class="box">
<p id="text-2" class="content-text"></p>
<input id="pass" placeholder="TOKEN V3NU5">
<button onclick="checkPass()">VERIFICAR</button>
</div>
</section>

<!-- 3 -->
<section class="section" id="sec-3" style="transform: translateZ(-2400px);">
<div class="box">
<h2 id="sync-label">0%</h2>
<button id="btn-sync" onclick="move(3,4)" style="display:none;">CONTINUAR</button>
</div>
</section>

<!-- 4 -->
<section class="section" id="sec-4" style="transform: translateZ(-3600px);">
<div class="box">
<p>Accediendo a archivos del núcleo...</p>
<button onclick="move(4,5)">SIGUIENTE</button>
</div>
</section>

<!-- 5 -->
<section class="section" id="sec-5" style="transform: translateZ(-4800px);">
<div class="box">
<p>Sincronización emocional detectada...</p>
<button onclick="move(5,6)">SIGUIENTE</button>
</div>
</section>

<!-- 6 -->
<section class="section" id="sec-6" style="transform: translateZ(-6000px);">
<div class="box">
<p>Compatibilidad neuronal: 100%</p>
<button onclick="move(6,7)">SIGUIENTE</button>
</div>
</section>

<!-- 7 -->
<section class="section" id="sec-7" style="transform: translateZ(-7200px);">
<div class="box">
<p>Simulación de futuro completada...</p>
<button onclick="move(7,8)">CONTINUAR</button>
</div>
</section>

<!-- 8 -->
<section class="section" id="sec-8" style="transform: translateZ(-8400px);">
<div class="box">
<p>Sistema MAGI ha emitido un veredicto...</p>
<button onclick="move(8,9)">FINALIZAR</button>
</div>
</section>

<!-- 9 -->
<section class="section" id="sec-9" style="transform: translateZ(-9600px);">
<div class="box">
<h1 class="glitch">TE AMO</h1>
<button onclick="location.reload()">REINICIAR</button>
</div>
</section>

</div>
</div>

<script>
const world = document.getElementById('world');
const sections = [...document.querySelectorAll('.section')];
let currentSection = 1;

function setSection(id){
    sections.forEach(s=>s.classList.remove('active'));
    document.getElementById(`sec-${id}`).classList.add('active');
}

function move(current, next){
    currentSection = next;

    // 🔧 FIX: distancia optimizada
    const z = -(next - 1) * 1200;
    world.style.transform = `translateZ(${z}px)`;

    setSection(next);

    if(next === 3) startSync();
}

function startApp(){
    move(1,2);
    typeWriter("text-2","Introduce el código correcto para continuar...");
}

/* 🔧 FIX input enfoque */
const pass = document.getElementById("pass");

pass.addEventListener("focus", ()=>{
    document.getElementById("sec-2").style.transform = "translateZ(0)";
});

pass.addEventListener("blur", ()=>{
    document.getElementById("sec-2").style.transform = "translateZ(-1200px)";
});

/* 🔧 ENTER */
pass.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") checkPass();
});

function checkPass(){
    if(pass.value.toUpperCase().trim()==="V3NU5-071025"){
        move(2,3);
    } else {
        alert("ACCESO DENEGADO");
    }
}

function startSync(){
    let progress = 0;
    const label = document.getElementById("sync-label");
    const btn = document.getElementById("btn-sync");

    const interval = setInterval(()=>{
        progress += 2;
        label.textContent = progress + "%";

        if(progress>=100){
            clearInterval(interval);
            btn.style.display="block";
        }
    },40);
}

function typeWriter(id,text){
    const el = document.getElementById(id);
    el.innerHTML="";
    let i=0;

    function write(){
        if(i<text.length){
            el.innerHTML += text[i];
            i++;
            setTimeout(write,20);
        }
    }
    write();
}

window.onload = ()=>{
    typeWriter("text-1","FIJANDO COORDENADAS...");
};
</script>

</body>
</html>
