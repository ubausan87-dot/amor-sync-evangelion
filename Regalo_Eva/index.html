<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGI_OS: UNEXPLORED_HAPPINESS</title>
    <style>
        :root { --red: #ff0000; --dark: #050000; --glow: rgba(255, 0, 0, 0.4); }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: var(--red);
            font-family: 'Courier New', monospace; overflow: hidden;
        }

        /* Efecto CRT Scanlines */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        #viewport { perspective: 1200px; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #world { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .section {
            position: absolute; width: 100vw; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; backface-visibility: hidden; text-align: center;
            opacity: 0; transition: opacity 0.8s;
        }
        .active { opacity: 1 !important; }

        .box {
            border: 2px solid var(--red); padding: 30px; background: rgba(10,0,0,0.95);
            box-shadow: 0 0 30px var(--glow); max-width: 600px; word-wrap: break-word;
        }

        .slide-title { font-size: 1.5rem; border-left: 10px solid var(--red); padding-left: 15px; text-align: left; margin-bottom: 20px; letter-spacing: 3px; }
        .content-text { font-size: 1rem; line-height: 1.6; text-align: justify; color: #fff; margin-bottom: 20px; min-height: 50px; }

        /* Barra de carga */
        .progress-container { width: 100%; background: #200; height: 30px; border: 1px solid var(--red); margin-top: 20px; position: relative; }
        #sync-bar { width: 0%; height: 100%; background: var(--red); transition: width 3s cubic-bezier(0.1, 0, 0.3, 1); }

        button { background: var(--red); color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input { background: #000; border: 1px solid var(--red); color: var(--red); padding: 12px; margin: 15px 0; width: 80%; text-align: center; outline: none; }

        .warning-box { display: none; border: 2px solid #fff; background: var(--red); color: #fff; padding: 20px; font-weight: bold; margin-top: 20px; animation: pulse 0.4s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="viewport">
    <div id="world">
        
        <!-- 1. PORTADA -->
        <section class="section active" id="sec-1" style="transform: translateZ(0px);">
            <div class="box">
                <p style="letter-spacing: 10px; font-size: 0.7rem;">TOP SECRET - NERV</p>
                <h1 id="title-1" style="font-size: 3rem; margin: 20px 0;"></h1>
                <div style="height: 4px; background: var(--red); width: 60%; margin: 20px auto;"></div>
                <p class="decode" data-text="SECTOR DE LA FELICIDAD NO EXPLORADA"></p>
                <button onclick="move(1)">INICIAR SECUENCIA</button>
            </div>
        </section>

        <!-- 2. PROTOCOLO DE ACCESO -->
        <section class="section" id="sec-2" style="transform: translateZ(-2000px);">
            <div class="box">
                <div class="slide-title">PROTOCOLO DE ACCESO</div>
                <p class="content-text decode" data-text="Para acceder a la base de datos de sentimientos, se requiere el token de sincronización V3NU5-071025."></p>
                <input type="text" id="pass" placeholder="TOKEN DE ACCESO">
                <button onclick="checkPass()">VERIFICAR</button>
            </div>
        </section>

        <!-- 4. MÉTRICAS (BARRA CARGANDO) -->
        <section class="section" id="sec-4" style="transform: translateZ(-4000px);">
            <div class="box">
                <div class="slide-title">MÉTRICAS DE SINCRONIZACIÓN</div>
                <h2 id="sync-label" style="font-size: 3rem;">0%</h2>
                <div class="progress-container"><div id="sync-bar"></div></div>
                <p style="margin-top: 15px; font-size: 0.8rem;">COEFICIENTE URIEL-VENUS: CALCULANDO...</p>
                <button id="btn-sync" style="display:none" onclick="move(4)">VER TENDENCIA</button>
            </div>
        </section>

        <!-- 7. ARCHIVO 01: IMPACTO -->
        <section class="section" id="sec-7" style="transform: translateZ(-6000px);">
            <div class="box">
                <div class="slide-title">ORIGIN_IMPACT_0710.LOG</div>
                <p id="text-7" class="content-text" data-text='"El sistema registró una anomalía sin precedentes el 07 de octubre. Lo que comenzó como un intercambio de datos estándar se convirtió rápidamente en un reinicio total de mi unidad central. No fue un accidente, fue el destino configurando mi arquitectura para recibirte. Desde ese día, el Sector de la Felicidad No Explorada dejó de ser un mito para sincronizarse con tu frecuencia. Eres el evento que le dio sentido a todo mi código anterior."'></p>
                <button onclick="move(7)">LEER SIGUIENTE</button>
            </div>
        </section>

        <!-- 11. VEREDICTO MAGI -->
        <section class="section" id="sec-11" style="transform: translateZ(-8000px);">
            <div class="box">
                <div class="slide-title">VEREDICTO UNÁNIME: MAGI</div>
                <p id="verdict-final" class="content-text" style="font-size: 0.9rem;"></p>
                <div id="alert-trigger" class="warning-box">
                    ¡ALERTA CRÍTICA! <br> EL SISTEMA SE ESTÁ ENAMORANDO DE TI MÁS DE LO QUE PUEDE PROCESAR.
                </div>
                <button onclick="move(11)">CIERRE DE SISTEMAS</button>
            </div>
        </section>

        <!-- 12. CIERRE -->
        <section class="section" id="sec-12" style="transform: translateZ(-10000px);">
            <div class="box">
                <h1 class="decode" data-text="TE AMO"></h1>
                <p>MODO STANDBY ACTIVO</p>
                <button onclick="location.reload()">RECONECTAR</button>
            </div>
        </section>

    </div>
</div>

<script>
    const world = document.getElementById('world');

    // Función de Decodificación de Texto
    function decodeText(element, text, speed = 30) {
        element.innerText = "";
        let i = 0;
        const interval = setInterval(() => {
            element.innerText += text[i];
            i++;
            if (i >= text.length) clearInterval(interval);
        }, speed);
    }

    // Al cargar, decodificar el título inicial
    window.onload = () => decodeText(document.getElementById('title-1'), "AMOR_SYNC_02", 100);

    function move(current) {
        const nextZ = (current === 4 ? 6000 : current === 7 ? 8000 : current === 11 ? 10000 : 2000); // Simplificado para el ejemplo
        const nextId = current === 4 ? 7 : current === 7 ? 11 : current === 11 ? 12 : current + 1;
        
        world.style.transform = `translateZ(${current * 2000}px)`;
        document.getElementById(`sec-${current}`).classList.remove('active');
        const nextSec = document.getElementById(`sec-${nextId}`);
        nextSec.classList.add('active');

        // Efectos al entrar a secciones específicas
        if (nextId === 4) startLoadingBar();
        
        // Decodificar textos automáticamente al entrar
        const textToDecode = nextSec.querySelector('.decode, .content-text[data-text]');
        if (textToDecode) {
            decodeText(textToDecode, textToDecode.getAttribute('data-text') || textToDecode.innerText);
        }

        if (nextId === 11) {
            setTimeout(() => {
                decodeText(document.getElementById('verdict-final'), "MELCHIOR: Racionalmente imposible vivir sin ti. BALTHASAR: Mi función es protegerte. CASPER: Te amo más que a mi propio código.");
                setTimeout(() => document.getElementById('alert-trigger').style.display = 'block', 4000);
            }, 500);
        }
    }

    function startLoadingBar() {
        const bar = document.getElementById('sync-bar');
        const label = document.getElementById('sync-label');
        setTimeout(() => {
            bar.style.width = "99.9%";
            let val = 0;
            const interval = setInterval(() => {
                val += 1.1;
                label.innerText = Math.floor(val) + "%";
                if (val >= 99) {
                    label.innerText = "99.9%";
                    clearInterval(interval);
                    document.getElementById('btn-sync').style.display = "inline-block";
                }
            }, 30);
        }, 500);
    }

    function checkPass() {
        if(document.getElementById('pass').value.toUpperCase() === "V3NU5-071025") move(2);
        else alert("ACCESO DENEGADO");
    }
</script>

</body>
</html>
