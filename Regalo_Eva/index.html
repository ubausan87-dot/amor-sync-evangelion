<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGI_OS_PREZI_MODE</title>
    <style>
        :root { --red: #ff0000; --dark: #050000; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: var(--red);
            font-family: 'Courier New', monospace; overflow: hidden;
        }

        /* Contenedor de la Cámara */
        #viewport {
            perspective: 1000px;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* El "Mundo" que se mueve */
        #world {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section {
            position: absolute;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            backface-visibility: hidden;
            text-align: center;
        }

        /* Posicionamiento en el espacio 3D (Z-axis) */
        #sec-login { transform: translateZ(0px); }
        #sec-stats { transform: translateZ(-2000px) rotateY(10deg); opacity: 0; }
        #sec-magi  { transform: translateZ(-4000px) rotateX(-10deg); opacity: 0; }

        .active { opacity: 1 !important; transition: opacity 1s; }

        /* Estética NERV */
        .box {
            border: 2px solid var(--red);
            padding: 30px;
            background: rgba(10,0,0,0.9);
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
            max-width: 400px;
        }

        input { background: #000; border: 1px solid var(--red); color: var(--red); padding: 12px; margin: 15px 0; width: 80%; text-align: center; }
        button { background: var(--red); color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; width: 100%; }
        
        .hex {
            border: 1px solid var(--red); margin: 10px; padding: 15px;
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
            background: rgba(50,0,0,0.2);
        }

        #bg-grid {
            position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background-image: linear-gradient(var(--red) 1px, transparent 1px), linear-gradient(90deg, var(--red) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05; z-index: -1;
            transform: rotateX(60deg);
        }
    </style>
</head>
<body>

<div id="bg-grid"></div>

<div id="viewport">
    <div id="world">
        
        <section class="section active" id="sec-login">
            <div class="box">
                <h2 style="letter-spacing: 5px;">MAGI SYSTEM</h2>
                <p style="font-size: 0.7rem;">ESPERANDO TOKEN DE ACCESO...</p>
                <input type="text" id="pass" placeholder="V3NU5-XXXXXX">
                <button onclick="goToStats()">INICIAR PROTOCOLO</button>
            </div>
        </section>

        <section class="section" id="sec-stats">
            <div class="box">
                <h3>ESTADO DE SINCRONIZACIÓN</h3>
                <div id="timer" style="font-size: 1.5rem; margin: 20px 0; font-weight: bold;"></div>
                <div style="text-align: left; font-size: 0.8rem;">
                    SYNC RATE: 99.9% <br>
                    NODE: ÁLAMO, VERACRUZ <br>
                    STATUS: ETERNAL_LINK
                </div>
                <button onclick="goToMagi()" style="margin-top: 20px;">SOLICITAR VEREDICTO</button>
            </div>
        </section>

        <section class="section" id="sec-magi">
            <h2 style="color: white; margin-bottom: 20px;">SISTEMA MAGI: UNÁNIME</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <div class="hex"><b>MELCHIOR-1</b> <br> <span style="font-size: 0.7rem;">APROBADO: Lógica Pura</span></div>
                <div class="hex"><b>BALTHASAR-2</b> <br> <span style="font-size: 0.7rem;">APROBADO: Instinto</span></div>
                <div class="hex"><b>CASPER-3</b> <br> <span style="font-size: 0.7rem;">APROBADO: Te amo, Venus</span></div>
            </div>
            <p onclick="location.reload()" style="margin-top: 30px; cursor: pointer; text-decoration: underline; font-size: 0.7rem;">CERRAR TERMINAL</p>
        </section>

    </div>
</div>

<script>
    const world = document.getElementById('world');

    function goToStats() {
        const p = document.getElementById('pass').value.toUpperCase();
        if(p === "V3NU5-071025") {
            // Animación Prezi: Zoom hacia la cámara
            world.style.transform = "translateZ(2000px) rotateY(-10deg)";
            document.getElementById('sec-login').classList.remove('active');
            document.getElementById('sec-stats').classList.add('active');
            startTimer();
        } else {
            alert("ACCESO DENEGADO");
        }
    }

    function goToMagi() {
        // Segundo Zoom: Más profundo
        world.style.transform = "translateZ(4000px) rotateX(10deg)";
        document.getElementById('sec-stats').classList.remove('active');
        document.getElementById('sec-magi').classList.add('active');
    }

    function startTimer() {
        const start = new Date('2025-10-07T00:00:00').getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - start;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('timer').innerHTML = `${d}D ${h}:${m}:${s}`;
        }, 1000);
    }
</script>

</body>
</html>
